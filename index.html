<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Enterprise Resume Screener</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #f8fafc; 
            --bg-sidebar: #ffffff; 
            --primary: #0284c7; 
            --primary-light: #e0f2fe;
            --success: #10b981;
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --text-main: #0f172a;
            --text-muted: #64748b; 
            --border: #e2e8f0; 
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .ai-icon { font-size: 24px; color: var(--primary); }
        .logo-container h2 { font-size: 22px; font-weight: 800; }
        .logo-container span { color: var(--primary); }

        .side-menu { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .menu-item { padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .menu-item.active { background: var(--primary-light); color: var(--primary); }

        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .page-header { margin-bottom: 30px; }
        .page-title { font-size: 28px; font-weight: 800; }

        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow); }
        .stat-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .workspace { display: grid; grid-template-columns: 380px 1fr; gap: 25px; align-items: start; }
        .panel { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        
        textarea { width: 100%; height: 120px; background: #f1f5f9; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: var(--text-main); outline: none; font-size: 14px; transition: 0.3s; resize: none; }
        textarea:focus { border-color: var(--primary); background: #fff; }

        .drag-drop-zone { height: 150px; border: 2px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; margin-top: 15px; background: #fafafa; }
        .drag-drop-zone:hover { border-color: var(--primary); background: var(--primary-light); }

        .primary-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .primary-btn:hover { background: #0271ad; transform: translateY(-1px); }

        .candidate-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 15px; transition: 0.3s; }
        .candidate-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

        /* Skill Box Logic */
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .analysis-box { padding: 12px; border-radius: 10px; border-left: 4px solid var(--border); }
        .match-box { background: #f0fdf4; border-left-color: var(--success); }
        .missing-box { background: #fef2f2; border-left-color: var(--danger); }
        
        .skill-tag { background: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin: 3px; display: inline-block; border: 1px solid rgba(0,0,0,0.05); }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-shortlisted { background: #dcfce7; color: var(--success); }
        .status-review { background: #fef3c7; color: var(--warning); }
        .status-rejected { background: #fee2e2; color: var(--danger); }

        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <i class="fa-solid fa-microchip ai-icon"></i>
            <h2>Nexus<span>AI</span></h2>
        </div>
        <nav class="side-menu">
            <a href="#" class="menu-item active"><i class="fa-solid fa-magnifying-glass-chart"></i> Deep Scan</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-user-tie"></i> Candidates</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        </nav>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://ui-avatars.com/api/?name=Karti+Kushvaha&background=0284c7&color=fff" style="width: 35px; border-radius: 10px;">
                <div><p style="font-weight: 700; font-size: 13px;">Karti Kushvaha</p><p style="color: var(--text-muted); font-size: 11px;">System Admin</p></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header"><h1 class="page-title">Neural Engine</h1><p style="color: var(--text-muted);">Comparative Skill Matrix & Semantic Matching</p></div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--primary-light); color: var(--primary);"><i class="fa-solid fa-folder-open"></i></div>
                <div><p style="font-size: 11px; color: var(--text-muted); font-weight: 700;">FILES</p><h2 id="totalProcessed">0</h2></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #dcfce7; color: var(--success);"><i class="fa-solid fa-check-double"></i></div>
                <div><p style="font-size: 11px; color: var(--text-muted); font-weight: 700;">PASSED</p><h2 id="topMatches">0</h2></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fef3c7; color: var(--warning);"><i class="fa-solid fa-bolt"></i></div>
                <div><p style="font-size: 11px; color: var(--text-muted); font-weight: 700;">PRECISION</p><h2>98.2%</h2></div>
            </div>
        </div>

        <section class="workspace">
            <div class="panel">
                <h3 style="font-size: 16px; margin-bottom: 20px; font-weight: 800;">Configuration</h3>
                <textarea id="jdInput" placeholder="Paste Job Description here..."></textarea>
                <div class="drag-drop-zone" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-file-upload" style="font-size: 24px; color: var(--primary); margin-bottom: 10px;"></i>
                    <p id="fileLabel" style="font-size: 13px; font-weight: 700;">Select Resumes</p>
                    <input type="file" id="fileInput" multiple hidden accept=".pdf,.docx">
                </div>
                <button id="startScanBtn" class="primary-btn">RUN SCREENING</button>
            </div>

            <div class="panel">
                <div id="idleState" style="text-align: center; padding: 40px;"><i class="fa-solid fa-robot" style="font-size: 40px; color: var(--border); margin-bottom: 15px; display: block;"></i><p style="color: var(--text-muted); font-weight: 600;">Neural Engine Idle. Awaiting inputs.</p></div>
                <div id="loadingState" class="hidden loading-wrap"><div class="spinner"></div><p style="color: var(--primary); font-weight: 700;">Processing Career Vectors...</p></div>
                <div id="resultsState" class="hidden">
                    <h3 style="font-size: 16px; margin-bottom: 20px; font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Shortlisted Candidates</h3>
                    <div id="candidateList"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const startBtn = document.getElementById('startScanBtn');
        const fileInput = document.getElementById('fileInput');
        const jdInput = document.getElementById('jdInput');
        const fileLabel = document.getElementById('fileLabel');

        fileInput.addEventListener('change', () => {
            fileLabel.innerText = `${fileInput.files.length} Resumes Ready`;
            fileLabel.style.color = 'var(--primary)';
        });

        startBtn.addEventListener('click', async () => {
            const jd = jdInput.value.trim();
            const files = fileInput.files;
            if (!jd || files.length === 0) { alert("Required: JD + Resumes"); return; }

            document.getElementById('idleState').classList.add('hidden');
            document.getElementById('resultsState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            startBtn.disabled = true;

            const formData = new FormData();
            formData.append('jd', jd);
            for (let i = 0; i < files.length; i++) formData.append('resumes', files[i]);

            try {
                const response = await fetch('http://127.0.0.1:5000/scan', { method: 'POST', body: formData });
                const results = await response.json();
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resultsState').classList.remove('hidden');
                document.getElementById('totalProcessed').innerText = results.length;
                document.getElementById('topMatches').innerText = results.filter(r => r.score >= 65).length;

                document.getElementById('candidateList').innerHTML = results.map(res => {
                    const score = parseFloat(res.score);
                    const statusClass = score >= 65 ? 'status-shortlisted' : (score >= 40 ? 'status-review' : 'status-rejected');
                    const accentColor = score >= 65 ? 'var(--success)' : (score >= 40 ? 'var(--warning)' : 'var(--danger)');

                    return `
                        <div class="candidate-card" style="border-left: 4px solid ${accentColor}">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div style="flex: 1;">
                                    <h4 style="font-size: 18px; font-weight: 800;">${res.name.split('.')[0]}</h4>
                                    
                                    <div class="analysis-grid">
                                        <div class="analysis-box match-box">
                                            <p style="font-size: 9px; color: var(--success); font-weight: 800; margin-bottom: 5px;">MATCHED SKILLS</p>
                                            ${res.matched_skills.length > 0 ? res.matched_skills.map(s => `<span class="skill-tag">${s}</span>`).join('') : '<span style="font-size:10px; color:#666;">No direct match</span>'}
                                        </div>
                                        <div class="analysis-box missing-box">
                                            <p style="font-size: 9px; color: var(--danger); font-weight: 800; margin-bottom: 5px;">MISSING SKILLS</p>
                                            ${res.missing_skills.length > 0 ? res.missing_skills.map(s => `<span class="skill-tag">${s}</span>`).join('') : '<span style="font-size:10px; color:var(--success);">Perfect fit</span>'}
                                        </div>
                                    </div>

                                    ${res.projects && res.projects.length > 0 ? `
                                        <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
                                            <p style="font-size: 9px; color: var(--text-muted); font-weight: 800; margin-bottom: 5px;">GITHUB VERIFICATION</p>
                                            ${res.projects.map(p => `<span class="skill-tag" style="color:var(--primary);"><i class="fa-brands fa-github"></i> ${p.name}</span>`).join('')}
                                        </div>
                                    ` : ''}
                                </div>

                                <div style="text-align: right; min-width: 100px; margin-left: 15px;">
                                    <div style="font-size: 26px; font-weight: 900; color: ${accentColor};">${res.score}%</div>
                                    <p style="font-size: 9px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700;">JD COMPATIBILITY</p>
                                    <span class="status-badge ${statusClass}">${res.status}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                alert("Backend offline! Run app.py first.");
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('idleState').classList.remove('hidden');
            }
            startBtn.disabled = false;
        });
    </script>
</body>
</html>
